<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cute Girl</title>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AT:ital,wght@0,100..400;1,100..400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.avif" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            justify-self: center;
            background-color: rgb(247, 123, 144);
        }

        .heart {
            font-size: 18px;
            font-family: Playwrite AT;
            animation: pulse 1s infinite;
            margin-top: 20px;
            padding-bottom: 10px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .fs {
            width: 250px;
            cursor: pointer;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        .fss {
            width: 250px;
            cursor: pointer;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        .card-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
            perspective: 1000px;
            /* 3D effect ke liye zaroori */
        }

        /* Card ki width aur height */
        .card {
            width: 250px;
            height: 350px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            /* 3D space banata hai */
            transition: transform 0.6s;
            /* Smooth animation */
        }

        /* Jab JS class add karega to card flip hoga */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Front aur Back ke common properties */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-family: Dancing Script;
            font-weight: bold;
            color: white;
            backface-visibility: hidden;
            /* Peeche wala part chhup jayega */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            flex-direction: column;
            border: 1px solid #000000;
        }

        .card-faces {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            display: flex;
            padding: 5px;
            align-items: center;
            font-size: 24px;
            font-family: Dancing Script;
            font-weight: bold;
            color: white;
            backface-visibility: hidden;
            /* Peeche wala part chhup jayega */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            flex-direction: column;
            border: 1px solid #000000;
        }

        /* Front Side ka Design */
        .card-front {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        /* Back Side ka Design */
        .card-back {
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            transform: rotateY(180deg);
            /* Back side ko pehle se 180 degree ghuma diya */
        }

        .yes {
            background-color: #c2e9fb;
            height: 200px;
            width: 250px;
            margin-bottom: 25px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border: 1.5px solid #000000;
        }

        .y {
            padding: 12px 20px;
            font-size: 18px;
            background: cornflowerblue;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            margin-left: 36.5%;
        }

        .btn {
            padding: 12px 20px;
            font-size: 18px;
            background: cornflowerblue;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transition: transform 0.4s ease;
            margin-top: 20px;
        }

        .btn.move {
            transform: translateX(150px) translateY(-50px);
        }
    </style>
</head>

<body>
    <div class="heder">
        <div class="heart">🥰🥰 Hello my cute 🥰🥰</div>
    </div>
    <div class="card-container">
        <!-- Card 2 -->
        <div class="card" onclick="flipCard(this)">
            <div class="card-face card-front">
                I Miss You
                <h1
                    style="background: none; font-size: 15px;color: #464545;margin-top: 20px;font-family: Playwrite AT;">
                    Touch Card</h1>
            </div>
            <div class="card-faces card-back">
                <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3aXloNjI0dmluNHFheHB0Y3J0eG5ydHVxaHB0YmJ3NWNzZ2F0bDVueiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/SrKbU4TRDgN8apkkES/giphy.gif"
                    alt="" class="fss">
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card" onclick="flipCard(this)">
            <div class="card-face card-front">
                Really I
                <h1
                    style="background: none; font-size: 15px;color: #464545;margin-top: 20px;font-family: Playwrite AT;">
                    Touch Card</h1>
            </div>
            <div class="card-faces card-back">
                <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3eXY3aDFoeXRuYTd4Y2lqdjR0eTBsbGFtbDRpanJrNWFoaGZiYjgzbSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/LPNaLs5X7vQt954DFU/giphy.gif"
                    alt="" class="fs">
                <h2 style="background: none; margin-top: 20px; color: rgb(246, 102, 126);">My Cute</h2>
            </div>
        </div>
        <!-- Card 4 -->
        <div class="card" onclick="flipCard(this)">
            <div class="card-face card-front">
                Your Photo
                <h1
                    style="background: none; font-size: 15px;color: #464545;margin-top: 20px;font-family: Playwrite AT;">
                    Touch Card</h1>
            </div>
            <div class="card-faces card-back">
                <h2 style="background: none; font-size: 30px;font-family: Dancing Script;margin-top: 20px;justify-content: center;align-items: center;
            font-size: 24px;">Tumhari fist Photo dekhane ke baad</h2>
                <audio controls style="width: 250px; cursor: pointer;margin-top: 20px;background: none;">
                    <source src="song.mpeg" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>
    <div class="yes">
        <h2 style="background: none;font-size: 25px;padding-top: 10px;padding-bottom: 20px;">Do you miss me.</h2>
        <a href="yesfile.html" class="y">Haa</a>
        <div class="btn" id="moveBtn">Nahi</div>
    </div>

    <script>
        function flipCard(clickedCard) {
            // Sab cards ko select karein
            var allCards = document.querySelectorAll('.card');

            // Har card ke liye check karein
            allCards.forEach(card => {
                // Agar clicked card aur existing card alag hain
                // to uska 'flipped' class hata dein (wo wapas front ho jayega)
                if (card !== clickedCard) {
                    card.classList.remove('flipped');
                }
            });

            // Ab clicked card par toggle karein (Open ho jaye ya Close ho jaye)
            clickedCard.classList.toggle('flipped');
        }
        const btn = document.getElementById('moveBtn');
        btn.addEventListener('click', () => {
            btn.classList.toggle('move');
        });
    </script>
</body>

</html>
